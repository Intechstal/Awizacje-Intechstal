<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Logowanie</title>

<link rel="stylesheet" href="/static/style.css">

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #f1f5f9;
}

/* CENTER BOX */
.login-wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BOX */
.box {
    background: white;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    width: 320px;
    text-align: center;
}

/* INPUTS */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
}

/* BUTTON */
button {
    padding: 12px;
    width: 100%;
    background: #0f172a;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
}

button:hover {
    background: #1e293b;
}

/* ERROR */
.error {
    color: #b91c1c;
    margin-bottom: 10px;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="login-wrapper">

    <div class="box">

        <h2>Logowanie</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="login" placeholder="Login" required>
            <input type="password" name="haslo" placeholder="Hasło" required>
            <button type="submit">Zaloguj</button>
        </form>

    </div>

</div>

</body>
</html>
