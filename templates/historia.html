<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Historia awizacji</title>
    <style>
        body {
            font-family: Arial;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        td, th {
            padding: 6px;
            border: 1px solid #ccc;
            text-align: center;
        }
        .oczekująca {
            background-color: #ffcccc;
        }
        .zaakceptowana {
            background-color: #ccffcc;
        }
        .odrzucona {
            background-color: #dddddd;
        }
    </style>
</head>
<body>

<h1>Pełna historia awizacji</h1>

<a href="/admin">⬅ Powrót do panelu</a>

<br><br>

<table>
<tr>
    <th>ID</th>
    <th>Firma</th>
    <th>Rejestracja</th>
    <th>Kierowca</th>
    <th>Email</th>
    <th>Telefon</th>
    <th>Data</th>
    <th>Typ</th>
    <th>Waga</th>
    <th>Status</th>
</tr>

{% for a in awizacje %}
<tr class="{{ a[10] }}">
    <td>{{ a[0] }}</td>
    <td>{{ a[1] }}</td>
    <td>{{ a[2] }}</td>
    <td>{{ a[3] }}</td>
    <td>{{ a[4] }}</td>
    <td>{{ a[5] }}</td>
    <td>{{ a[6] }}</td>
    <td>{{ a[7] }}</td>
    <td>{{ a[8] }}</td>
    <td>{{ a[10] }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
