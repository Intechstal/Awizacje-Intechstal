<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sloty</title>
</head>

<body>

<h2>Konfiguracja blokady slotów</h2>

<form method="post">

<table border="1">
<tr>
    <th>Typ</th>
    <th>Blokada (ile slotów)</th>
</tr>

{% for s in data %}
<tr>
    <td>{{ s[0] }}</td>
    <td>
        <input type="number" name="{{ s[0] }}" value="{{ s[1] }}">
    </td>
</tr>
{% endfor %}

</table>

<button>Zapisz</button>

</form>

</body>
</html>
