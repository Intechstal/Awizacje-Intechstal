<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>
</head>
<body>
    <h1>Panel logowania</h1>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}

    <form method="POST">
        Login: <input type="text" name="login"><br><br>
        Hasło: <input type="password" name="haslo"><br><br>
        <input type="submit" value="Zaloguj">
    </form>
</body>
</html>
