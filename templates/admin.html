<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel admina</title>

<style>
body {
    font-family: system-ui;
    background: #f4f6f9;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

th {
    background: #1f2937;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

.oczekująca { background: #fff3cd; }
.zaakceptowana { background: #d1e7dd; }
.odrzucona { background: #f8d7da; }

a {
    margin-right: 8px;
}
</style>

</head>

<body>

<h1>🚚 Panel admina</h1>

<a href="/logout">Wyloguj</a> |
<a href="/admin/logi">Logi</a> |
<a href="/admin/historia">Historia</a>

<h2>Awizacje</h2>

<table>
<tr>
    <th>ID</th>
    <th>Firma</th>
    <th>Rejestracja</th>
    <th>Kierowca</th>
    <th>Data</th>
    <th>Status</th>
    <th>Akcje</th>
</tr>

{% for a in awizacje %}
<tr class="{{ a[10] }}">
    <td>{{ a[0] }}</td>
    <td>{{ a[1] }}</td>
    <td>{{ a[2] }}</td>
    <td>{{ a[3] }}</td>
    <td>{{ a[6] }}</td>
    <td>{{ a[10] }}</td>
    <td>
        <form action="/admin/update_status/{{ a[0] }}" method="post">
            <select name="status">
                <option>oczekująca</option>
                <option>zaakceptowana</option>
                <option>odrzucona</option>
            </select>
            <button>OK</button>
        </form>

        <a href="/admin/edit/{{ a[0] }}">Edytuj</a>
    </td>
</tr>
{% endfor %}
</table>

</body>
</html>
