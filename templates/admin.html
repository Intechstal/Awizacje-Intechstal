<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel admina</title>

<style>
body {
    font-family: system-ui;
    background: #f4f6f9;
    padding: 20px;
}

h1 { margin-bottom: 20px; }

a {
    margin-right: 10px;
    text-decoration: none;
    padding: 6px 10px;
    background: #333;
    color: white;
    border-radius: 6px;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-top: 20px;
}

.day {
    background: white;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.day-title {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 13px;
}

.slot {
    font-size: 11px;
    padding: 5px;
    margin: 3px 0;
    border-radius: 6px;
    text-align: center;
}

.oczekująca {
    background: #fff3cd;
}

.zaakceptowana {
    background: #d1e7dd;
}

.odrzucona {
    background: #f8d7da;
}
</style>
</head>

<body>

<h1>🚚 Panel administratora</h1>

<a href="/logout">Wyloguj</a>
<a href="/admin/logi">Logi</a>
<a href="/admin/historia">Historia</a>

<div class="calendar">

{% for d in dni %}
<div class="day">

    <div class="day-title">
        {{ d.strftime('%d.%m') }}
    </div>

    {% for h in godziny %}
        {% set slot = d.strftime('%Y-%m-%d') + 'T' + h %}

        {% if slot in zajete %}
            <div class="slot {{ zajete[slot]['status'] }}">
                {{ h }}<br>
                {{ zajete[slot]['firma'] }}
            </div>
        {% else %}
            <div class="slot" style="background:#f1f5f9;">
                {{ h }}
            </div>
        {% endif %}
    {% endfor %}

</div>
{% endfor %}

</div>

</body>
</html>
