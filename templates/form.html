<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Awizacja</title>

<style>
:root {
    --navy: #0f172a;
    --navy-2: #1e293b;
    --gray: #f1f5f9;
    --gray-2: #e2e8f0;
    --white: #ffffff;
}

body {
    font-family: system-ui;
    background: var(--gray);
    margin: 0;
    padding: 20px;
    color: #0b0f19;
}

.box {
    max-width: 650px;
    margin: auto;
    background: var(--white);
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
    color: var(--navy);
}

label {
    font-weight: 600;
    font-size: 13px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0 14px;
    border-radius: 8px;
    border: 1px solid var(--gray-2);
}

input:focus, select:focus, textarea:focus {
    border-color: var(--navy);
    outline: none;
}

button {
    background: var(--navy);
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    font-weight: bold;
}

button:hover {
    background: var(--navy-2);
}

.error {
    background: #fee2e2;
    color: #7f1d1d;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="box">

<h1>🚚 Awizacja transportu</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form action="/zapisz" method="post">

<label>Firma</label>
<input name="firma" value="{{ dane.firma or '' }}" required>

<label>Rejestracja</label>
<input name="rejestracja" value="{{ dane.rejestracja or '' }}" required>

<label>Kierowca</label>
<input name="kierowca" value="{{ dane.kierowca or '' }}" required>

<label>Email</label>
<input name="email" value="{{ dane.email or '' }}" required>

<label>Telefon</label>
<input name="telefon" value="{{ dane.telefon or '' }}" required>

<label>Typ ładunku</label>

<select name="typ_ladunku" required>
    {% set opcje = [
        "Odbiór złomu",
        "Odbiór zamówienia",
        "Dostawa materiału"
    ] %}

    {% for opcja in opcje %}
        <option value="{{ opcja }}"
            {% if dane.typ_ladunku == opcja %}selected{% endif %}>
            {{ opcja }}
        </option>
    {% endfor %}
</select>

<label>Waga</label>
<input name="waga_ladunku" value="{{ dane.waga_ladunku or '' }}">

<label>Komentarz</label>
<textarea name="komentarz">{{ dane.komentarz or '' }}</textarea>

<label>Termin</label>

<select name="data_godzina" required>
    {% for d in dni %}
        <optgroup label="{{ d.strftime('%d.%m') }}">
        {% for h in godziny %}
            {% set slot = d.strftime('%Y-%m-%d') + 'T' + h %}
            {% if slot not in zajete %}
                <option value="{{ slot }}"
                    {% if dane.data_godzina == slot %}selected{% endif %}>
                    {{ d.strftime('%d.%m') }} {{ h }}
                </option>
            {% endif %}
        {% endfor %}
        </optgroup>
    {% endfor %}
</select>

<button>Wyślij awizację</button>

</form>

</div>

</body>
</html>
