<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Awizacja</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=4">
</head>

<body>

<div class="topbar">

    <div class="topbar-left">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    </div>

    <div class="topbar-center">
        Awizacja transportu
    </div>

    <div class="topbar-right">
        <a href="/admin" class="top-link">Admin</a>
    </div>

</div>

<div class="form-box">

<h1>Awizacja transportu</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form action="/zapisz" method="post">

<label>Firma</label>
<input name="firma" value="{{ dane.firma or '' }}" required>

<label>Rejestracja</label>
<input name="rejestracja" value="{{ dane.rejestracja or '' }}" required>

<label>Kierowca</label>
<input name="kierowca" value="{{ dane.kierowca or '' }}" required>

<label>Email</label>
<input name="email" value="{{ dane.email or '' }}" required>

<label>Telefon</label>
<input name="telefon" value="{{ dane.telefon or '' }}" required>

<label>Typ ładunku</label>
<select name="typ_ladunku" required>
    {% set opcje = ["Odbiór złomu","Odbiór zamówienia","Dostawa materiału"] %}
    {% for opcja in opcje %}
        <option value="{{ opcja }}" {% if dane.typ_ladunku == opcja %}selected{% endif %}>
            {{ opcja }}
        </option>
    {% endfor %}
</select>

<label>Waga</label>
<input name="waga_ladunku" value="{{ dane.waga_ladunku or '' }}">

<label>Komentarz</label>
<textarea name="komentarz">{{ dane.komentarz or '' }}</textarea>

<label>Termin</label>
<select name="data_godzina" required>
    {% for d in dni %}
        <optgroup label="{{ d.strftime('%d.%m') }}">
        {% for h in godziny %}
            {% set slot = d.strftime('%Y-%m-%d') + 'T' + h %}
            {% if slot not in zajete %}
                <option value="{{ slot }}"
                    {% if dane.data_godzina == slot %}selected{% endif %}>
                    {{ d.strftime('%d.%m') }} {{ h }}
                </option>
            {% endif %}
        {% endfor %}
        </optgroup>
    {% endfor %}
</select>

<button type="submit" class="submit-btn">Wyślij awizację</button>

<div class="rodo-small">
    <a href="https://intechstal.pl/rodo/" target="_blank">
        RODO / polityka prywatności
    </a>
</div>

</form>

</div>

</body>
</html>
