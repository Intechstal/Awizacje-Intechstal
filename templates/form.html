<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Awizacja - Intechstal</title>

    <style>
        body {
            font-family: system-ui, Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .box {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        label {
            font-weight: 600;
            font-size: 13px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input[type=submit] {
            background: #16a34a;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        input[type=submit]:hover {
            background: #15803d;
        }

        .error {
            background: #ffe4e6;
            padding: 10px;
            border-radius: 8px;
            color: #b91c1c;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="box">

<h1>🚚 Formularz awizacji</h1>

{% if error %}
    <div class="error">{{ error }}</div>
{% endif %}

<form action="/zapisz" method="post">

    <label>Firma</label>
    <input type="text" name="firma" value="{{ dane.firma or '' }}" required>

    <label>Rejestracja</label>
    <input type="text" name="rejestracja" required>

    <label>Kierowca</label>
    <input type="text" name="kierowca" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Telefon</label>
    <input type="text" name="telefon" required>

    <label>Typ ładunku</label>
    <select name="typ_ladunku">
        <option>Odbiór złomu</option>
        <option>Dostawa materiału</option>
        <option>Odbiór zamówienia</option>
    </select>

    <label>Waga</label>
    <input type="text" name="waga_ladunku">

    <label>Komentarz</label>
    <textarea name="komentarz"></textarea>

    <label>Termin</label>
    <select name="data_godzina">

        {% for d in dni %}
            <optgroup label="{{ d.strftime('%d.%m') }}">
            {% for h in godziny %}
                {% set slot = d.strftime('%Y-%m-%d') + 'T' + h %}
                {% if slot not in zajete %}
                    <option value="{{ slot }}">
                        {{ d.strftime('%d.%m') }} {{ h }}
                    </option>
                {% endif %}
            {% endfor %}
            </optgroup>
        {% endfor %}

    </select>

    <input type="submit" value="Wyślij awizację">

</form>

</div>

</body>
</html>
