<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Awizacja</title>

<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="box" style="position:relative;">

<!-- LOGO LEWY GÓRNY RÓG -->
<img src="/static/logo.png" style="
    position:absolute;
    top:10px;
    left:10px;
    width:60px;
    height:60px;
    object-fit:contain;
">

<h1 style="padding-left:80px;">🚚 Awizacja transportu</h1>

<!-- DARK MODE -->
<button onclick="toggleDark()" style="
    position:absolute;
    top:10px;
    right:10px;
    width:auto;
    padding:6px 10px;
    background:#1e293b;
    color:white;
    border:none;
    border-radius:6px;
">
🌙 / ☀️
</button>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form action="/zapisz" method="post" enctype="multipart/form-data">

<label>Firma</label>
<input name="firma" value="{{ dane.firma or '' }}" required>

<label>Rejestracja</label>
<input name="rejestracja" value="{{ dane.rejestracja or '' }}" required>

<label>Kierowca</label>
<input name="kierowca" value="{{ dane.kierowca or '' }}" required>

<label>Email</label>
<input name="email" value="{{ dane.email or '' }}" required>

<label>Telefon</label>
<input name="telefon" value="{{ dane.telefon or '' }}" required>

<label>Typ ładunku</label>

<select name="typ_ladunku" required>
    {% set opcje = [
        "Odbiór złomu",
        "Odbiór zamówienia",
        "Dostawa materiału"
    ] %}

    {% for opcja in opcje %}
        <option value="{{ opcja }}"
            {% if dane.typ_ladunku == opcja %}selected{% endif %}>
            {{ opcja }}
        </option>
    {% endfor %}
</select>

<label>Waga</label>
<input name="waga_ladunku" value="{{ dane.waga_ladunku or '' }}">

<label>Komentarz</label>
<textarea name="komentarz">{{ dane.komentarz or '' }}</textarea>

<!-- 📷 JPG UPLOAD -->
<label>Zdjęcie (JPG)</label>
<input type="file" name="zdjecie" accept="image/jpeg">

{% if dane.zdjecie %}
    <div style="margin:10px 0;">
        <img src="/uploads/{{ dane.zdjecie }}" style="
            width:120px;
            height:120px;
            object-fit:cover;
            border-radius:10px;
            border:2px solid #0f172a;
        ">
    </div>
{% endif %}

<label>Termin</label>

<select name="data_godzina" required>
    {% for d in dni %}
        <optgroup label="{{ d.strftime('%d.%m') }}">
        {% for h in godziny %}
            {% set slot = d.strftime('%Y-%m-%d') + 'T' + h %}
            {% if slot not in zajete %}
                <option value="{{ slot }}"
                    {% if dane.data_godzina == slot %}selected{% endif %}>
                    {{ d.strftime('%d.%m') }} {{ h }}
                </option>
            {% endif %}
        {% endfor %}
        </optgroup>
    {% endfor %}
</select>

<button type="submit">Wyślij awizację</button>

</form>

</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

window.onload = function () {
    if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
