<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Awizacja transportu</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

    <div class="topbar-left">
        <img src="/static/logo.png" class="logo">
    </div>

    <div class="topbar-center">
        Awizacja transportu
    </div>

    <div class="topbar-right">
        <button class="dark-btn" onclick="toggleDark()">🌙</button>
    </div>

</div>

<div class="box">

<h2>🚚 Formularz awizacji</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form action="/zapisz" method="post">

<label>Firma</label>
<input name="firma" value="{{ dane.firma or '' }}" required>

<label>Rejestracja</label>
<input name="rejestracja" value="{{ dane.rejestracja or '' }}" required>

<label>Kierowca</label>
<input name="kierowca" value="{{ dane.kierowca or '' }}" required>

<label>Email</label>
<input name="email" value="{{ dane.email or '' }}" required>

<label>Telefon</label>
<input name="telefon" value="{{ dane.telefon or '' }}" required>

<label>Typ ładunku</label>
<select name="typ_ladunku" required>
    <option value="Odbiór złomu">Odbiór złomu</option>
    <option value="Odbiór zamówienia">Odbiór zamówienia</option>
    <option value="Dostawa materiału">Dostawa materiału</option>
</select>

<label>Waga</label>
<input name="waga_ladunku" value="{{ dane.waga_ladunku or '' }}">

<label>Komentarz</label>
<textarea name="komentarz">{{ dane.komentarz or '' }}</textarea>

<label>Termin</label>

<select name="data_godzina" required>
    {% for d in dni %}
        <optgroup label="{{ d.strftime('%d.%m') }}">
        {% for h in godziny %}
            {% set slot = d.strftime('%Y-%m-%d') + 'T' + h %}
            {% if slot not in zajete %}
                <option value="{{ slot }}">
                    {{ d.strftime('%d.%m') }} {{ h }}
                </option>
            {% endif %}
        {% endfor %}
        </optgroup>
    {% endfor %}
</select>

<button type="submit">Wyślij awizację</button>

</form>

</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("dark", document.body.classList.contains("dark"));
}

window.onload = () => {
    if (localStorage.getItem("dark") === "true") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
