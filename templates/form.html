<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Awizacja - Intechstal</title>

    <style>
        body {
            font-family: system-ui, Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .box {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        label {
            font-weight: 600;
            font-size: 13px;
        }

        .error {
            background: #ffe4e6;
            padding: 10px;
            border-radius: 8px;
            color: #b91c1c;
            margin-bottom: 10px;
        }

        button {
            background: #16a34a;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #15803d;
        }

        /* KALENDARZ */
        #calendar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .day {
            background: #fff;
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .day-title {
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
        }

        .slot {
            padding: 6px;
            margin: 4px 0;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: 0.2s;
        }

        .slot:hover {
            background: #e0f2fe;
        }

        .busy {
            background: #f8d7da;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .selected {
            background: #22c55e !important;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">

<h1>🚚 Formularz awizacji</h1>

{% if error %}
    <div class="error">{{ error }}</div>
{% endif %}

<form action="/zapisz" method="post">

    <label>Firma</label>
    <input name="firma" value="{{ dane.firma or '' }}" required>

    <label>Rejestracja</label>
    <input name="rejestracja" value="{{ dane.rejestracja or '' }}" required>

    <label>Kierowca</label>
    <input name="kierowca" value="{{ dane.kierowca or '' }}" required>

    <label>Email</label>
    <input name="email" value="{{ dane.email or '' }}" required>

    <label>Telefon</label>
    <input name="telefon" value="{{ dane.telefon or '' }}" required>

    <label>Typ ładunku</label>
    <input name="typ_ladunku" value="{{ dane.typ_ladunku or '' }}">

    <label>Waga</label>
    <input name="waga_ladunku" value="{{ dane.waga_ladunku or '' }}">

    <label>Komentarz</label>
    <textarea name="komentarz">{{ dane.komentarz or '' }}</textarea>

    <label><b>Wybierz termin (kliknij slot)</b></label>

    <input type="hidden" id="data_godzina" name="data_godzina" required>

    <div id="calendar"></div>

    <br>
    <button type="submit">Wyślij awizację</button>

</form>

</div>

<script>
const dni = {{ dni|tojson }};
const godziny = {{ godziny|tojson }};
const zajete = {{ zajete|tojson }};

const calendar = document.getElementById("calendar");
const input = document.getElementById("data_godzina");

let selected = null;

dni.forEach(d => {

    const dayBox = document.createElement("div");
    dayBox.className = "day";

    const title = document.createElement("div");
    title.className = "day-title";
    title.innerText = new Date(d).toLocaleDateString('pl-PL', {
        weekday: 'short',
        day: '2-digit',
        month: '2-digit'
    });

    dayBox.appendChild(title);

    godziny.forEach(h => {

        const slotKey = d.split("T")[0] + "T" + h;

        const slot = document.createElement("div");
        slot.className = "slot";
        slot.innerText = h;

        if (zajete[slotKey]) {
            slot.classList.add("busy");
            slot.innerText += " ❌";
        } else {
            slot.onclick = () => {
                if (selected) selected.classList.remove("selected");

                slot.classList.add("selected");
                selected = slot;

                input.value = slotKey;
            };
        }

        dayBox.appendChild(slot);
    });

    calendar.appendChild(dayBox);
});
</script>

</body>
</html>
