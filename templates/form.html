<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Awizacja - Intechstal</title>

<style>
body {
    font-family: system-ui;
    background: #f4f6f9;
    padding: 20px;
}

.box {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

label {
    font-weight: 600;
    font-size: 13px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #16a34a;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    font-weight: bold;
}

.error {
    background: #ffe4e6;
    padding: 10px;
    border-radius: 8px;
    color: #b91c1c;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="box">

<h1>🚚 Formularz awizacji</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form action="/zapisz" method="post">

<label>Firma</label>
<input name="firma" value="{{ dane.firma or '' }}" required>

<label>Rejestracja</label>
<input name="rejestracja" value="{{ dane.rejestracja or '' }}" required>

<label>Kierowca</label>
<input name="kierowca" value="{{ dane.kierowca or '' }}" required>

<label>Email</label>
<input name="email" value="{{ dane.email or '' }}" required>

<label>Telefon</label>
<input name="telefon" value="{{ dane.telefon or '' }}" required>

<label>Typ ładunku</label>

<select name="typ_ladunku" required>
    {% set opcje = [
        "Odbiór złomu",
        "Odbiór zamówienia",
        "Dostawa materiału"
    ] %}

    {% for opcja in opcje %}
        <option value="{{ opcja }}"
            {% if dane.typ_ladunku == opcja %}selected{% endif %}>
            {{ opcja }}
        </option>
    {% endfor %}
</select>

<label>Waga</label>
<input name="waga_ladunku" value="{{ dane.waga_ladunku or '' }}">

<label>Komentarz</label>
<textarea name="komentarz">{{ dane.komentarz or '' }}</textarea>

<label>Termin</label>

<select name="data_godzina" required>
    {% for d in dni %}
        <optgroup label="{{ d.strftime('%d.%m') }}">
        {% for h in godziny %}
            {% set slot = d.strftime('%Y-%m-%d') + 'T' + h %}
            {% if slot not in zajete %}
                <option value="{{ slot }}"
                    {% if dane.data_godzina == slot %}selected{% endif %}>
                    {{ d.strftime('%d.%m') }} {{ h }}
                </option>
            {% endif %}
        {% endfor %}
        </optgroup>
    {% endfor %}
</select>

<button>Wyślij awizację</button>

</form>

</div>

</body>
</html>
